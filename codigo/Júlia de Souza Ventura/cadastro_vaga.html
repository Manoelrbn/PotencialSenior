<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Empresa/Vagas</title>
    <link rel="stylesheet" href="cadastro_vaga.css">
</head>
<body>
    <main>
        <h1>Bem-vindo(a) ao seu novo Potencial!</h1>
        <p>Vamos começar cadastrando os dados da sua empresa e a vaga que deseja divulgar!</p>

        <section class="form-section">
            <form id="cadastroVagaForm" action="/submit" method="post">
                <h2>Dados da empresa</h2>
                <hr>
                <div class="dados-empresa">
                    <div class="input-group3"> 
                        <label for="nome-empresa">Nome da empresa*</label>
                        <input type="text" id="nome-empresa" name="nome-empresa" required>               
                    </div>
                    <div class="input-group2">
                        <label for="cnpj">CNPJ*</label>
                        <input type="text" id="cnpj" name="cnpj" required>
                    </div>
                    <div class="input-group2">
                        <label for="categoria-empresa">Categoria da empresa*</label>
                        <input type="text" id="categoria-empresa" name="categoria-empresa" required>
                    </div>
                </div>

                <h2>Dados da vaga</h2>
                <hr>
                <div class="dados-vaga">
                    <div class="input-group2">
                        <label for="salario">Faixa salarial*</label>
                        <input type="text" id="salario" name="salario" required>
                    </div>
                    <div class="input-group2">
                        <label for="localizacao">Localização*</label>
                        <input type="text" id="localizacao" name="localizacao" required>
                    </div>
                </div>

                <h2>Descrição da vaga</h2>
                <hr>
                <div class="descricao-vaga">
                    <textarea name="resumo" id="resumo" rows="7" placeholder="Insira um pequeno resumo sobre a vaga*"></textarea>
                    <textarea name="responsabilidades" id="responsabilidades" rows="7" placeholder="Responsabilidades do empregado*"></textarea>
                    <textarea name="requisitos" id="requisitos" rows="7" placeholder="Requisitos necessários*"></textarea>
                </div>

                <div class="buttonsalvar">
                    <button type="submit">Salvar informações</button>
                </div>
            </form>
        </section>
    </main>
    <script src="cadastro_vaga.js"></script>   
</body>
</html>
